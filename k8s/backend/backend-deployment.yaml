apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:

      - name: backend

        image: devipriyadp1/aldi-lidl-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        env:
        - name: DATABASE_URL
          value: postgresql://admin:admin123@postgres-service:5432/offersdb
